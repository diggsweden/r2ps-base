name: Pull Request Workflow
on:
  pull_request:
permissions:
  contents: read
jobs:
  pr-checks:
    uses: diggsweden/reusable-ci/.github/workflows/pullrequest-orchestrator.yml@0d87fcd4cd9550e50bfa1923b98afbed80708325 # v2.7.9
    secrets: inherit
    permissions:
      contents: read
      packages: read
      security-events: write
    with:
      reusable-ci-ref: v2.7.9
      project-type: maven
      linters.megalint: false
      linters.devbasecheck: true
      linters.commitlint: false
      linters.licenselint: false
  test:
    needs: [pr-checks]
    if: always()
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/test.yml
