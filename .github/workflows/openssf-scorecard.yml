name: OpenSSF Scorecard Analysis
on:
  schedule:
    - cron: "50 1 * * 6"
    - cron: "50 1 * * 3"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  scorecard-analysis:
    permissions:
      contents: read
      security-events: write
      id-token: write
    uses: diggsweden/reusable-ci/.github/workflows/security-openssf-scorecard.yml@0d87fcd4cd9550e50bfa1923b98afbed80708325 # v2.7.9
    with:
      publish-results: true
